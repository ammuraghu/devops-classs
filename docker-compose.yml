version: "3"

services:
  application:
    image: amzammu/image1:latest
    container_name: my-web-app
    ports:
      - "8080:8080"
    networks:
      - vinod-network
    depends_on:
      - mysqldb
    volumes:
      - application-data:/data/spring-boot

  mysqldb:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sbms
    networks:
      - vinod-network
    volumes:
      - mysql-data:/var/lib/mysql

networks:
  vinod-network:

volumes:
  application-data:
  mysql-data:

